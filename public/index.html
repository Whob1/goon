<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goon VoiceFlow</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06080f;
      --panel: #101522;
      --panel-2: #151d30;
      --text: #ecf2ff;
      --muted: #9da9c2;
      --accent: #6ea8fe;
      --accent-2: #9b7bff;
      --ok: #2ecc71;
      --warn: #f39c12;
      --border: #24314d;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(1200px 500px at 0% -5%, #1a2240 0%, transparent 70%),
        radial-gradient(1000px 400px at 100% 0%, #271a43 0%, transparent 65%),
        var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    #app {
      width: min(1200px, 100%);
      height: min(940px, 95vh);
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 35%), var(--panel);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    #header {
      border-bottom: 1px solid var(--border);
      background: #0b111e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 20px rgba(110, 168, 254, 0.7);
    }

    .tabs { display: flex; gap: 8px; }
    .tab {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: 120ms ease;
    }
    .tab.active {
      border-color: transparent;
      background: linear-gradient(135deg, rgba(110,168,254,0.2), rgba(155,123,255,0.2));
      box-shadow: inset 0 0 0 1px rgba(133,151,255,0.4);
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid var(--border);
      background: #0d1527;
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--text);
    }

    .panel { display: none; height: 100%; }
    .panel.active { display: grid; }

    #chat-panel { grid-template-rows: 1fr auto; }

    #messages {
      overflow: auto;
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .message {
      max-width: min(85%, 760px);
      border-radius: 14px;
      padding: 10px 12px;
      white-space: pre-wrap;
      line-height: 1.35;
      word-break: break-word;
      border: 1px solid transparent;
      animation: riseIn 120ms ease;
    }

    @keyframes riseIn {
      from { transform: translateY(2px); opacity: 0.6; }
      to { transform: translateY(0); opacity: 1; }
    }

    .message.user {
      margin-left: auto;
      background: linear-gradient(145deg, #234e96, #2c2e7e);
      border-color: rgba(146, 174, 255, 0.3);
      color: #f5f8ff;
    }
    .message.assistant {
      background: #101a2f;
      border-color: #23365e;
      color: #f1f5ff;
    }
    .message.system {
      margin-inline: auto;
      background: #241d13;
      border-color: #4f3b1b;
      color: #ffd79a;
      font-style: italic;
      text-align: center;
    }

    #composer {
      border-top: 1px solid var(--border);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      background: #0b111d;
    }

    input, select, textarea, button {
      font: inherit;
      color: var(--text);
      border: 1px solid var(--border);
      background: #0f1729;
      border-radius: 12px;
      padding: 10px 12px;
    }

    textarea { resize: vertical; min-height: 84px; }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #6f90ff;
      box-shadow: 0 0 0 3px rgba(111, 144, 255, 0.2);
    }

    button {
      cursor: pointer;
      transition: 120ms ease;
      background: linear-gradient(135deg, #294779, #3d2f7c);
      border-color: #4f5f98;
    }
    button:hover { filter: brightness(1.08); transform: translateY(-1px); }

    #settings-panel {
      grid-template-rows: auto 1fr auto;
      gap: 0;
      overflow: hidden;
    }

    .settings-head {
      padding: 14px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    .settings-body {
      overflow: auto;
      padding: 14px;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      align-content: start;
    }

    .field {
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .field label { font-size: 12px; color: var(--muted); }

    .field.full { grid-column: 1 / -1; }

    .settings-foot {
      border-top: 1px solid var(--border);
      background: #0b111d;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding: 12px;
      flex-wrap: wrap;
    }

    .ghost { background: #13203a; }
    .provider-card { border:1px solid var(--border); border-radius:12px; padding:10px; background:#0d1525; display:grid; gap:6px; }
    .provider-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .provider-row code { background:#111a2e; padding:2px 6px; border-radius:6px; }

    @media (max-width: 680px) {
      #composer { grid-template-columns: 1fr; }
      .message { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="brand"><span class="brand-dot"></span> Goon VoiceFlow</div>
      <div class="tabs">
        <button class="tab active" data-panel="chat-panel">Chat</button>
        <button class="tab" data-panel="settings-panel">Settings</button>
      </div>
      <div class="status">
        <span class="pill" id="connection-pill">Connecting…</span>
        <span class="pill" id="session-pill">No Session</span>
      </div>
    </header>

    <section id="chat-panel" class="panel active">
      <div id="messages"></div>
      <div id="composer">
        <input id="input" type="text" placeholder="Type a message or slash command…" maxlength="10000" />
        <button id="send">Send</button>
        <button id="quick-settings" class="ghost">Open Settings</button>
      </div>
    </section>

    <section id="settings-panel" class="panel">
      <div class="settings-head">Settings apply instantly to this session. Use “Save Defaults” to persist for future sessions.</div>
      <form id="settings-form" class="settings-body">
        <div class="field"><label for="provider">LLM Provider</label><select id="provider"></select></div>
        <div class="field"><label for="fallbackProvider">Fallback Provider</label><select id="fallbackProvider"></select></div>
        <div class="field full">
          <label>Provider Profiles</label>
          <div class="provider-card">
            <div class="provider-row">
              <input id="providerProfileName" placeholder="provider-name" />
              <input id="providerProfileBaseUrl" placeholder="https://api.example.com/v1" />
              <input id="providerProfileApiKey" type="password" placeholder="api key" />
            </div>
            <div class="provider-row">
              <input id="providerProfileDefaultModel" placeholder="default model" />
              <input id="providerProfileModels" placeholder="models (comma separated)" />
              <button type="button" id="provider-save" class="ghost">Save Profile</button>
              <button type="button" id="provider-delete" class="ghost">Delete Profile</button>
            </div>
            <div id="provider-summary" class="status"></div>
          </div>
        </div>
        <div class="field"><label for="model">Model</label><input id="model" /></div>
        <div class="field"><label for="temperature">Temperature (0-2)</label><input id="temperature" type="number" step="0.1" min="0" max="2" /></div>
        <div class="field"><label for="memorySize">Memory Size (1-100)</label><input id="memorySize" type="number" min="1" max="100" /></div>
        <div class="field"><label for="maxTokens">Max Tokens (100-4000)</label><input id="maxTokens" type="number" min="100" max="4000" /></div>
        <div class="field"><label for="ttsEnabled">TTS Enabled</label><select id="ttsEnabled"><option value="false">Off</option><option value="true">On</option></select></div>
        <div class="field"><label for="ttsProvider">TTS Provider</label><select id="ttsProvider"><option value="openai">openai</option><option value="elevenlabs">elevenlabs</option></select></div>
        <div class="field"><label for="ttsVoice">TTS Voice</label><input id="ttsVoice" /></div>
        <div class="field"><label for="ttsModel">TTS Model</label><input id="ttsModel" /></div>
        <div class="field"><label for="ttsSpeed">TTS Speed (0.25-4)</label><input id="ttsSpeed" type="number" step="0.05" min="0.25" max="4" /></div>
        <div class="field"><label for="sttModel">STT Model</label><input id="sttModel" /></div>
        <div class="field"><label for="sttLanguage">STT Language</label><input id="sttLanguage" /></div>
        <div class="field"><label for="sttPunctuate">STT Punctuate</label><select id="sttPunctuate"><option value="true">On</option><option value="false">Off</option></select></div>
        <div class="field full"><label for="systemPrompt">System Prompt</label><textarea id="systemPrompt"></textarea></div>
      </form>
      <div class="settings-foot">
        <button id="refresh-settings" class="ghost">Reload</button>
        <button id="apply-settings">Apply Session</button>
        <button id="save-settings">Save Defaults</button>
      </div>
    </section>
  </div>

  <script>
    let ws;
    let sessionId = localStorage.getItem('sessionId');
    let pendingMessages = [];
    let appendHandle = null;
    let providerProfiles = [];

    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.panel');
    const connectionPill = document.getElementById('connection-pill');
    const sessionPill = document.getElementById('session-pill');

    const fields = {
      provider: document.getElementById('provider'),
      fallbackProvider: document.getElementById('fallbackProvider'),
      model: document.getElementById('model'),
      temperature: document.getElementById('temperature'),
      systemPrompt: document.getElementById('systemPrompt'),
      memorySize: document.getElementById('memorySize'),
      maxTokens: document.getElementById('maxTokens'),
      ttsEnabled: document.getElementById('ttsEnabled'),
      ttsProvider: document.getElementById('ttsProvider'),
      ttsVoice: document.getElementById('ttsVoice'),
      ttsModel: document.getElementById('ttsModel'),
      ttsSpeed: document.getElementById('ttsSpeed'),
      sttModel: document.getElementById('sttModel'),
      sttLanguage: document.getElementById('sttLanguage'),
      sttPunctuate: document.getElementById('sttPunctuate'),
      providerProfileName: document.getElementById('providerProfileName'),
      providerProfileBaseUrl: document.getElementById('providerProfileBaseUrl'),
      providerProfileApiKey: document.getElementById('providerProfileApiKey'),
      providerProfileDefaultModel: document.getElementById('providerProfileDefaultModel'),
      providerProfileModels: document.getElementById('providerProfileModels')
    };

    const setPanel = (id) => {
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.panel === id));
      panels.forEach(panel => panel.classList.toggle('active', panel.id === id));
    };

    tabs.forEach(tab => tab.addEventListener('click', () => setPanel(tab.dataset.panel)));
    document.getElementById('quick-settings').addEventListener('click', () => setPanel('settings-panel'));

    function queueMessage(content, type) {
      pendingMessages.push({ content, type });
      if (appendHandle) return;
      appendHandle = requestAnimationFrame(() => {
        const frag = document.createDocumentFragment();
        for (const msg of pendingMessages) {
          const div = document.createElement('div');
          div.className = `message ${msg.type}`;
          div.textContent = msg.content;
          frag.appendChild(div);
        }
        messagesDiv.appendChild(frag);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        pendingMessages = [];
        appendHandle = null;
      });
    }

    function setConnectionStatus(text) {
      connectionPill.textContent = text;
    }

    async function fetchProviders() {
      if (!sessionId) return;
      const res = await fetch(`/api/providers/${encodeURIComponent(sessionId)}`);
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Failed to load provider profiles');
      providerProfiles = data.providers || [];
      const names = providerProfiles.map(p => p.name);
      for (const key of ['provider', 'fallbackProvider']) {
        fields[key].innerHTML = names.map(p => `<option value="${p}">${p}</option>`).join('');
      }
      updateProviderSummary();
      syncProviderEditor(fields.provider.value || data.activeProvider);
    }

    function updateProviderSummary() {
      const el = document.getElementById('provider-summary');
      if (!providerProfiles.length) {
        el.textContent = 'No provider profiles configured';
        return;
      }
      el.innerHTML = providerProfiles.map(p => `<span class="pill">${p.name}: ${p.model || 'no model'} (${p.hasApiKey ? 'key' : 'no key'})</span>`).join(' ');
    }

    function syncProviderEditor(providerName) {
      const profile = providerProfiles.find(p => p.name === providerName);
      if (!profile) return;
      fields.providerProfileName.value = profile.name;
      fields.providerProfileBaseUrl.value = profile.baseUrl || '';
      fields.providerProfileApiKey.value = '';
      fields.providerProfileDefaultModel.value = profile.model || '';
      fields.providerProfileModels.value = (profile.models || []).join(', ');
      if (profile.models?.length && !profile.models.includes(fields.model.value)) {
        fields.model.value = profile.model || profile.models[0] || fields.model.value;
      }
    }

    async function fetchSettings() {
      if (!sessionId) return;
      const res = await fetch(`/api/settings/${encodeURIComponent(sessionId)}`);
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Failed to load settings');

      const s = data.settings;
      await fetchProviders();
      fields.provider.value = s.provider;
      fields.fallbackProvider.value = s.fallbackProvider;
      fields.model.value = s.model;
      fields.temperature.value = s.temperature;
      fields.systemPrompt.value = s.systemPrompt;
      fields.memorySize.value = s.memorySize;
      fields.maxTokens.value = s.maxTokens;
      fields.ttsEnabled.value = String(Boolean(s.ttsEnabled));
      fields.ttsProvider.value = s.tts?.provider || 'openai';
      fields.ttsVoice.value = s.tts?.voice || '';
      fields.ttsModel.value = s.tts?.model || '';
      fields.ttsSpeed.value = s.tts?.speed ?? 1;
      fields.sttModel.value = s.stt?.model || '';
      fields.sttLanguage.value = s.stt?.language || '';
      fields.sttPunctuate.value = String(Boolean(s.stt?.punctuate));
      syncProviderEditor(s.provider);
    }

    function collectSettings() {
      return {
        provider: fields.provider.value,
        fallbackProvider: fields.fallbackProvider.value,
        model: fields.model.value.trim(),
        temperature: Number(fields.temperature.value),
        systemPrompt: fields.systemPrompt.value.trim(),
        memorySize: Number(fields.memorySize.value),
        maxTokens: Number(fields.maxTokens.value),
        ttsEnabled: fields.ttsEnabled.value === 'true',
        tts: {
          provider: fields.ttsProvider.value,
          voice: fields.ttsVoice.value.trim(),
          model: fields.ttsModel.value.trim(),
          speed: Number(fields.ttsSpeed.value)
        },
        stt: {
          model: fields.sttModel.value.trim(),
          language: fields.sttLanguage.value.trim(),
          punctuate: fields.sttPunctuate.value === 'true'
        }
      };
    }

    async function saveProviderProfile() {
      if (!sessionId) return;
      const payload = {
        name: fields.providerProfileName.value.trim(),
        baseUrl: fields.providerProfileBaseUrl.value.trim(),
        apiKey: fields.providerProfileApiKey.value.trim(),
        defaultModel: fields.providerProfileDefaultModel.value.trim(),
        models: fields.providerProfileModels.value.split(',').map(v => v.trim()).filter(Boolean)
      };
      if (!payload.name || !payload.baseUrl || !payload.apiKey) {
        throw new Error('Provider name, base URL and API key are required to save a profile.');
      }
      const response = await fetch(`/api/providers/${encodeURIComponent(sessionId)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      if (!data.success) throw new Error(data.error || 'Failed to save provider profile');
      queueMessage(`🔌 Provider profile "${payload.name}" saved.`, 'system');
      await fetchSettings();
      fields.provider.value = payload.name;
      fields.providerProfileApiKey.value = '';
    }

    async function deleteProviderProfile() {
      if (!sessionId) return;
      const name = fields.providerProfileName.value.trim();
      if (!name) throw new Error('Choose or enter a provider profile name first.');
      const response = await fetch(`/api/providers/${encodeURIComponent(sessionId)}/${encodeURIComponent(name)}`, { method: 'DELETE' });
      const data = await response.json();
      if (!data.success) throw new Error(data.error || 'Failed to delete provider profile');
      queueMessage(`🗑️ Provider profile "${name}" removed.`, 'system');
      await fetchSettings();
    }

    async function applySettings() {
      if (!sessionId) return;
      const response = await fetch(`/api/settings/${encodeURIComponent(sessionId)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(collectSettings())
      });
      const data = await response.json();
      if (!data.success) throw new Error(data.error || 'Failed to update settings');
      queueMessage('✅ Session settings updated from Settings page.', 'system');
    }

    async function saveDefaults() {
      if (!sessionId) return;
      const response = await fetch(`/api/settings/${encodeURIComponent(sessionId)}/save`, { method: 'POST' });
      const data = await response.json();
      if (!data.success) throw new Error(data.error || 'Failed to save defaults');
      queueMessage('💾 Settings saved as defaults for this session id.', 'system');
    }

    async function withUiFeedback(fn) {
      try {
        await fn();
      } catch (err) {
        queueMessage(`⚠️ ${err.message}`, 'system');
      }
    }

    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(protocol + '//' + window.location.host);

      ws.onopen = () => {
        setConnectionStatus('Connected');
        ws.send(JSON.stringify({ type: 'init', sessionId }));
      };

      ws.onmessage = async (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'sessionId') {
          sessionId = data.sessionId;
          localStorage.setItem('sessionId', sessionId);
          sessionPill.textContent = sessionId;
          await withUiFeedback(fetchSettings);
        } else if (data.type === 'text') {
          queueMessage(data.content, 'assistant');
        } else if (data.type === 'error') {
          queueMessage(data.content, 'system');
        } else if (data.type === 'audio') {
          const audio = new Audio('data:audio/mpeg;base64,' + data.buffer);
          audio.play().catch(err => queueMessage(`Audio playback failed: ${err.message}`, 'system'));
        }
      };

      ws.onclose = () => {
        setConnectionStatus('Reconnecting…');
        queueMessage('Connection lost. Reconnecting…', 'system');
        setTimeout(connect, 2500);
      };

      ws.onerror = () => setConnectionStatus('Connection Error');
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text || ws?.readyState !== WebSocket.OPEN) return;
      queueMessage(text, 'user');
      ws.send(JSON.stringify({ type: 'text', content: text }));
      input.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.getElementById('refresh-settings').addEventListener('click', () => withUiFeedback(fetchSettings));
    document.getElementById('apply-settings').addEventListener('click', () => withUiFeedback(applySettings));
    document.getElementById('save-settings').addEventListener('click', () => withUiFeedback(saveDefaults));
    document.getElementById('provider-save').addEventListener('click', () => withUiFeedback(saveProviderProfile));
    document.getElementById('provider-delete').addEventListener('click', () => withUiFeedback(deleteProviderProfile));
    fields.provider.addEventListener('change', () => syncProviderEditor(fields.provider.value));

    connect();
  </script>
</body>
</html>
